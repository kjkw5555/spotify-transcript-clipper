<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Transcript</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --green: #1DB954;
      --green-dim: #158a3e;
      --black: #0a0a0a;
      --surface: #121212;
      --surface2: #1a1a1a;
      --surface3: #242424;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888;
      --text-muted: #555;
      --error: #e04040;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--black);
    }

    .logo {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
      font-family: var(--mono);
    }

    /* ─── BODY ─── */
    .body {
      padding: 14px 16px;
    }

    /* ─── EXTRACT BUTTON ─── */
    .btn-extract {
      width: 100%;
      padding: 10px 16px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-extract:hover { background: #22d860; }
    .btn-extract:active { transform: scale(0.98); }
    .btn-extract:disabled {
      background: var(--surface3);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .btn-extract svg { flex-shrink: 0; }

    /* ─── STATUS ─── */
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface3);
      color: var(--text-dim);
    }

    .status.error {
      display: block;
      background: rgba(224, 64, 64, 0.12);
      color: #f07070;
      border-left: 2px solid var(--error);
      white-space: pre-wrap;
    }

    .status.success-msg {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(29, 185, 84, 0.1);
      color: var(--green);
      border-left: 2px solid var(--green);
      font-weight: 500;
    }

    /* spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── TRANSCRIPT AREA ─── */
    .transcript-box {
      margin-top: 12px;
      display: none;
    }

    .transcript-box.visible { display: block; }

    .transcript-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .transcript-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .transcript-meta span {
      color: var(--green);
      font-weight: 500;
    }

    .btn-copy {
      padding: 4px 10px;
      background: var(--surface3);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-copy:hover {
      background: var(--surface3);
      border-color: var(--green);
      color: var(--green);
    }

    .btn-copy.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(29, 185, 84, 0.1);
    }

    .transcript-content {
      background: var(--black);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      max-height: 280px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .transcript-content::-webkit-scrollbar { width: 4px; }
    .transcript-content::-webkit-scrollbar-track { background: transparent; }
    .transcript-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* timestamp styling inside pre */
    .transcript-content .ts {
      color: var(--green);
      font-weight: 500;
      font-size: 10px;
    }

    /* ─── HINT ─── */
    .hint {
      margin-top: 12px;
      padding: 8px 10px;
      background: var(--surface2);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .hint strong {
      color: var(--text-dim);
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Spotify SVG logo -->
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="12" fill="#1DB954"/>
      <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.4-.85 13.1 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.3.25zm-.1 2.8c-.25.4-.75.5-1.15.25-2.65-1.6-6.7-2.1-9.85-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.6-1.05 8.05-.55 11.1 1.35.4.25.5.75.35 1zm-1.3 2.75c-.2.35-.65.45-1 .25-2.3-1.4-5.2-1.75-8.65-.95-.35.1-.7-.15-.75-.5-.1-.35.15-.7.5-.75 3.75-.85 6.95-.45 9.55 1.1.35.15.45.65.35 .85z" fill="black"/>
    </svg>
    <div class="header-text">
      <h1>Transcript Extractor</h1>
      <p>spotify podcast · 聴きながら読む</p>
    </div>
  </div>

  <div class="body">
    <button class="btn-extract" id="btnExtract">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="currentColor"/>
      </svg>
      トランスクリプトを取得
    </button>

    <div class="status loading" id="statusLoading">
      <div class="spinner"></div>
      <span>スクロールしてトランスクリプトを検索中...</span>
    </div>

    <div class="status error" id="statusError"></div>

    <div class="status success-msg" id="statusSuccess">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span id="successText">取得完了</span>
    </div>

    <div class="transcript-box" id="transcriptBox">
      <div class="transcript-toolbar">
        <div class="transcript-meta" id="transcriptMeta"></div>
        <button class="btn-copy" id="btnCopy">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M8 4v12a2 2 0 002 2h8a2 2 0 002-2V7.242a2 2 0 00-.602-1.43L16.083 2.57A2 2 0 0014.685 2H10a2 2 0 00-2 2z" stroke="currentColor" stroke-width="2"/>
            <path d="M16 18v2a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2" stroke="currentColor" stroke-width="2"/>
          </svg>
          コピー
        </button>
      </div>
      <div class="transcript-content" id="transcriptContent"></div>
    </div>

    <div class="hint" id="hint">
      <strong>使い方</strong>
      Spotifyでポッドキャストを再生し、右パネルの「聴きながら読む」を開いてからこのボタンを押してください。
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
